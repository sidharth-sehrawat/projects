apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: postgres
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/sidharth-sehrawat/projects.git
    targetRevision: master
    path: example-voting-app-gitops/postgres

  destination:
    server: https://kubernetes.default.svc
    namespace: postgres

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
