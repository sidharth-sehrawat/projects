apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
  labels:
    app: result

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: result

  template:
    metadata:
      labels:
        app: result

    spec:
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}

      containers:
      - name: result

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 80
